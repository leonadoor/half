services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "1455:1455"
    environment:
      - HALF_ADMIN_PASSWORD=${HALF_ADMIN_PASSWORD:?HALF_ADMIN_PASSWORD is required. See .env.example.}
      - HALF_SECRET_KEY=${HALF_SECRET_KEY:?HALF_SECRET_KEY is required. See .env.example.}
      - HALF_ALLOW_REGISTER=${HALF_ALLOW_REGISTER:-false}
      - HALF_DEMO_SEED_ENABLED=${HALF_DEMO_SEED_ENABLED:-true}
      - HALF_STRICT_SECURITY=${HALF_STRICT_SECURITY:-true}
    volumes:
      - backend-data:/app/data
      - backend-repos:/app/repos
    command: ["uv", "run", "--no-dev", "--frozen", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-repos:
